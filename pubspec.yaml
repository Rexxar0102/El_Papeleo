name: el_papeleo
description: "Guía de trámites en Cuba - App móvil offline-first"
publish_to: 'none'
version: 1.0.2+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Backend y autenticación
  supabase_flutter: ^2.8.0

  # Navegación
  go_router: ^14.8.0

  # State management
  flutter_riverpod: ^2.6.0

  # Almacenamiento local offline
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Monitoreo de conexión
  connectivity_plus: ^6.1.0

  # Utilidades
  intl: ^0.19.0
  url_launcher: ^6.3.0
  cached_network_image: ^3.4.0
  flutter_svg: ^2.0.10
  shared_preferences: ^2.5.0
  crypto: ^3.0.0
  http: ^1.2.0
  package_info_plus: ^8.0.0
  open_filex: ^4.4.0

  # Iconos y diseño
  fl_chart: ^0.70.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Hive type adapters generados
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

  # Generador de iconos de app
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
